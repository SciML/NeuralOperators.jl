name: "Format Check"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags: "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  runic:
    name: "Runic"
    uses: "SciML/.github/.github/workflows/runic.yml@v1"
    secrets: "inherit"
